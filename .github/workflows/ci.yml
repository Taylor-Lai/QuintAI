name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements/runtime.txt -r requirements/dev.txt
      - run: python -m pip install --no-deps -e backend
      - run: ruff check backend scripts
      - run: mypy
      - run: python -m compileall -q backend/src
      - run: pytest -m "not api_acceptance" --cov=docnexus.ai.table_engine.execution --cov=docnexus.ai.table_engine.planning --cov=docnexus.ai.table_engine.quality --cov-report=term-missing --cov-fail-under=75
      - run: python scripts/evaluate_table_engine.py

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm audit --omit=dev
